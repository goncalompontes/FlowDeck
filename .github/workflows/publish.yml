name: Publish to npm

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: plugin/package-lock.json
          registry-url: "https://registry.npmjs.org/"

      - name: Install dependencies
        
        run: npm ci

      - name: Typecheck
        
        run: npm run typecheck

      - name: Test
        
        run: npm run test

      - name: Build
        
        run: npm run build

      - name: Publish
        
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}name: Publish to npm

